name: CI

on:
  push:
    branches:
      - main
      - codex/**
  pull_request:

jobs:
  test-and-eval:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      MOAA_LLM_PROVIDER: stub
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run pytest
        run: pytest -q

      - name: Run core eval checks
        run: |
          python scripts/eval_matrix.py
          python scripts/eval_router.py
          python scripts/eval_dual_gate.py

      - name: Run production smoke checks
        run: |
          python scripts/preflight_prod.py --output reports/preflight_prod.json
          python scripts/load_smoke.py --output reports/load_smoke.json --iters 50
