name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v0.1.0)"
        required: true
        type: string
      release_name:
        description: "Optional release title"
        required: false
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    env:
      MOAA_LLM_PROVIDER: stub
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Validate release candidate
        run: |
          pytest -q
          python scripts/eval_matrix.py
          python scripts/eval_router.py
          python scripts/eval_dual_gate.py
          python scripts/preflight_prod.py --output reports/preflight_prod.json
          python scripts/load_smoke.py --output reports/load_smoke.json --iters 50

      - name: Build release artifact bundle
        run: |
          mkdir -p dist
          tar -czf "dist/moaa-prime-reports-${{ inputs.tag }}.tgz" reports

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: moaa-prime-reports-${{ inputs.tag }}
          path: dist/moaa-prime-reports-${{ inputs.tag }}.tgz

      - name: Publish GitHub release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_NAME="${{ inputs.release_name }}"
          if [ -z "${RELEASE_NAME}" ]; then
            RELEASE_NAME="${{ inputs.tag }}"
          fi
          gh release view "${{ inputs.tag }}" >/dev/null 2>&1 || gh release create "${{ inputs.tag }}" --title "${RELEASE_NAME}" --notes "Automated production release"
          gh release upload "${{ inputs.tag }}" "dist/moaa-prime-reports-${{ inputs.tag }}.tgz" --clobber
